<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SOC Log Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>SOC Log Analyzer Dashboard</h1>

    <div class="grid">
        <div class="card">
            <div class="number" id="total">0</div>
            <div class="label">Total Events</div>
        </div>
        <div class="card">
            <div class="number" id="failed">0</div>
            <div class="label">Failed Attempts</div>
        </div>
        <div class="card">
            <div class="number" id="success">0</div>
            <div class="label">Successful Logins</div>
        </div>
        <div class="card">
            <div class="number" id="alerts-count">0</div>
            <div class="label">Suspicious IPs</div>
        </div>
    </div>

    <div class="section">
        <h2>Alerts</h2>
        <table>
            <thead>
                <tr>
                    <th>IP Address</th>
                    <th>Failed Attempts</th>
                    <th>Users Targeted</th>
                    <th>Severity</th>
                    <th>Activity</th>
                </tr>
            </thead>
            <tbody id="alerts-table"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>Successful Logins</h2>
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>User</th>
                    <th>IP Address</th>
                </tr>
            </thead>
            <tbody id="logins-table"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>All Events</h2>
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Type</th>
                    <th>User</th>
                    <th>IP Address</th>
                </tr>
            </thead>
            <tbody id="events-table"></tbody>
        </table>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
